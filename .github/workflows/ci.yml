name: CI
on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    branches-ignore:
      - gh-pages

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Setup tools
      - name: Run Rokit
        uses: CompeyDev/setup-rokit@v0.2.1

      # Run linter
      - name: Update standard library
        run: selene update-roblox-std
      - name: Run Selene
        run: selene --allow-warnings ./Cmdr

      - name: Validate Stylua
        run: stylua -c ./Cmdr
